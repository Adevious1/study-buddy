services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: studybuddy
      POSTGRES_PASSWORD: studybuddy
      POSTGRES_DB: studybuddy
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studybuddy -d studybuddy"]
      interval: 2s
      timeout: 2s
      retries: 20

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://studybuddy:studybuddy@postgres:5432/studybuddy
      PORT: "3001"
      NODE_ENV: development
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      BILLING_TRIAL_DAYS: ${BILLING_TRIAL_DAYS:-14}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:5173}
      # Observability (SP10) — optional; unset = disabled
      SENTRY_DSN: ${SENTRY_DSN:-}
      OPS_METRICS_TOKEN: ${OPS_METRICS_TOKEN:-}
    volumes:
      - ./apps/server:/app/apps/server
      - ./packages/shared:/app/packages/shared
      - server_node_modules:/app/node_modules
      - server_pkg_node_modules:/app/apps/server/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
    ports:
      - "3001:3001"
    healthcheck:
      test:
        - "CMD"
        - "bun"
        - "-e"
        - "fetch('http://localhost:3001/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 2s
      timeout: 2s
      retries: 30

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      VITE_API_TARGET: http://server:3001
      # Optional edge Basic Auth gate for tunnel/family testing ("user:pass").
      # Unset in normal local dev — the gate is a no-op then.
      TUNNEL_BASIC_AUTH: ${TUNNEL_BASIC_AUTH:-}
      # Observability (SP10) — optional; unset = web Sentry disabled
      VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/shared:/app/packages/shared
      - web_node_modules:/app/node_modules
      - web_pkg_node_modules:/app/apps/web/node_modules
    ports:
      - "5173:5173"

volumes:
  pgdata:
  server_node_modules:
  server_pkg_node_modules:
  shared_node_modules:
  web_node_modules:
  web_pkg_node_modules:
